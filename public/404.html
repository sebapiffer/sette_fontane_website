<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>Sette Fontane</title>
    <!--
      Fallback SPA per GitHub Pages: le rotte lato client (es. /scopri-azienda)
      non esistono come file, quindi Pages serve questo 404. Lo script codifica
      il percorso nella query e reindirizza all'index, che lo decodifica e lo
      ripristina (vedi lo snippet in index.html). pathSegmentsToKeep = 1 perché
      il sito vive nella sottocartella /sette_fontane_website/ (project page).
      Tecnica: rafgraph/spa-github-pages.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
